<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <main class="main-content">
        <header th:replace="~{fragments/layout :: header}"></header>
        <div th:replace="~{fragments/layout :: alerts}"></div>
        <div class="content-body">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-bell"></i> Notifikasi</h2>
                    <form th:action="@{/notifications/read-all}" method="post">
                        <button type="submit" class="btn btn-sm btn-secondary"><i class="fas fa-check-double"></i> Tandai Semua Dibaca</button>
                    </form>
                </div>
                <div class="card-body">
                    <div th:if="${allNotifications.empty}" class="empty-state">
                        <i class="fas fa-bell-slash"></i><p>Belum ada notifikasi</p>
                    </div>
                    <div class="notification-list">
                        <div th:each="n : ${allNotifications}" class="notification-item" th:classappend="${!n.read} ? 'unread'">
                            <div class="notif-dot" th:if="${!n.read}"></div>
                            <div class="notif-icon-lg" th:classappend="'notif-' + ${n.type.toLowerCase()}">
                                <i class="fas" th:classappend="${n.type == 'WARNING'} ? 'fa-exclamation-triangle' : (${n.type == 'SUCCESS'} ? 'fa-check-circle' : 'fa-info-circle')"></i>
                            </div>
                            <div class="notif-body">
                                <h4 th:text="${n.title}">Title</h4>
                                <p th:text="${n.message}">Message</p>
                                <span class="notif-time" th:text="${n.timeAgo}">Time</span>
                            </div>
                            <div class="notif-actions">
                                <a th:if="${n.berkasId != null}" th:href="@{/berkas/{id}(id=${n.berkasId})}" class="btn btn-sm btn-primary">
                                    <i class="fas fa-eye"></i></a>
                                <form th:if="${!n.read}" th:action="@{/notifications/read/{id}(id=${n.id})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-secondary" title="Tandai dibaca"><i class="fas fa-check"></i></button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
