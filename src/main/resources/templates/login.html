<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AlurBerkas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo"><i class="fas fa-layer-group"></i></div>
                <h1>AlurBerkas</h1>
                <p>Sistem Workflow Berkas Pengukuran Tanah</p>
                <span class="login-badge">Kantor Pertanahan BPN ATR/BPN</span>
            </div>
            <div th:if="${error}" class="login-alert login-alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Error</span>
            </div>
            <div th:if="${message}" class="login-alert login-alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}">Message</span>
            </div>
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="nip"><i class="fas fa-id-badge"></i> NIP</label>
                    <input type="text" id="nip" name="nip" placeholder="Masukkan NIP Anda" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>
            <div class="login-footer">
                <p>&copy; 2026 AlurBerkas v1.0 — Seksi Pengukuran &amp; Pemetaan</p>
            </div>
        </div>
        <div class="login-decoration">
            <div class="decoration-circle c1"></div>
            <div class="decoration-circle c2"></div>
            <div class="decoration-circle c3"></div>
        </div>
    </div>
</body>
</html>
