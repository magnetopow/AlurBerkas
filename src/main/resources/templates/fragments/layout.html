<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — AlurBerkas'">AlurBerkas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:fragment="sidebar" class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
            <div class="logo-text">
                <span class="logo-title">AlurBerkas</span>
                <span class="logo-subtitle">BPN ATR/BPN</span>
            </div>
        </div>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar"><i class="fas fa-user"></i></div>
        <div class="user-info">
            <span class="user-name" th:text="${user.nama}">Nama</span>
            <span class="user-role" th:text="${user.role.displayName}">Role</span>
        </div>
    </div>
    <div class="sidebar-menu">
        <a href="/dashboard" class="menu-item" th:classappend="${pageTitle == 'Dashboard'} ? 'active'">
            <i class="fas fa-home"></i><span>Dashboard</span>
        </a>
        <a href="/berkas" class="menu-item" th:classappend="${pageTitle != null && pageTitle.contains('Berkas')} ? 'active'">
            <i class="fas fa-folder-open"></i><span>Daftar Berkas</span>
        </a>
        <a th:if="${user.role.name() == 'ADMIN' || user.role.name() == 'SUPER_ADMIN'}"
           href="/berkas/create" class="menu-item" th:classappend="${pageTitle == 'Input Berkas Baru'} ? 'active'">
            <i class="fas fa-plus-circle"></i><span>Input Berkas</span>
        </a>
        <a href="/notifications" class="menu-item" th:classappend="${pageTitle == 'Notifikasi'} ? 'active'">
            <i class="fas fa-bell"></i><span>Notifikasi</span>
            <span class="menu-badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount}">0</span>
        </a>
        <a th:if="${user.role.name() == 'SUPER_ADMIN'}" href="/users" class="menu-item"
           th:classappend="${pageTitle != null && pageTitle.contains('User')} ? 'active'">
            <i class="fas fa-users-cog"></i><span>Manajemen User</span>
        </a>
    </div>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="menu-item logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
        </form>
    </div>
</nav>
<header th:fragment="header" class="top-header">
    <div class="header-left">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1 class="page-title" th:text="${pageTitle}">Title</h1>
    </div>
    <div class="header-right">
        <div class="header-user">
            <span class="header-user-name" th:text="${user.nama}">Nama</span>
            <div class="header-user-avatar"><i class="fas fa-user"></i></div>
        </div>
    </div>
</header>
<div th:fragment="alerts" class="alerts-container">
    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i><span th:text="${success}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i><span th:text="${error}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
    </div>
</div>
</body>
</html>
