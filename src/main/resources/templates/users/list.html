<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <main class="main-content">
        <header th:replace="~{fragments/layout :: header}"></header>
        <div th:replace="~{fragments/layout :: alerts}"></div>
        <div class="content-body">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-users-cog"></i> Manajemen User</h2>
                    <a href="/users/create" class="btn btn-primary"><i class="fas fa-plus"></i> Tambah User</a>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead><tr><th>NIP</th><th>Nama</th><th>Role</th><th>No. HP</th><th>Status</th><th>Aksi</th></tr></thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td th:text="${u.nip}">-</td>
                                    <td><strong th:text="${u.nama}">-</strong></td>
                                    <td><span class="role-badge" th:text="${u.role.displayName}">-</span></td>
                                    <td th:text="${u.noHp ?: '-'}">-</td>
                                    <td><span class="status-badge" th:classappend="${u.active} ? 'status-active' : 'status-inactive'" th:text="${u.active} ? 'Aktif' : 'Nonaktif'">-</span></td>
                                    <td class="action-cell">
                                        <a th:href="@{/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-primary"><i class="fas fa-edit"></i></a>
                                        <form th:action="@{/users/toggle/{id}(id=${u.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm" th:classappend="${u.active} ? 'btn-warning' : 'btn-success'"
                                                    th:title="${u.active} ? 'Nonaktifkan' : 'Aktifkan'">
                                                <i class="fas" th:classappend="${u.active} ? 'fa-ban' : 'fa-check'"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
